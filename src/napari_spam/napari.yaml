name: napari-spam
display_name: Spam
# use 'hidden' to remove plugin from napari hub search results
visibility: public
# see https://napari.org/stable/plugins/technical_references/manifest.html#fields for valid categories
# categories: []
contributions:
  commands:
    - id: napari-spam.make_container_widget
      python_name: napari_spam:ImageThreshold
      title: Make threshold Container widget
    - id: napari-spam.make_magic_widget
      python_name: napari_spam:threshold_magic_widget
      title: Make threshold magic widget
    - id: napari-spam.make_function_widget
      python_name: napari_spam:threshold_autogenerate_widget
      title: Make threshold function widget
    - id: napari-spam.make_qwidget
      python_name: napari_spam:ExampleQWidget
      title: Make example QWidget
  widgets:
    - command: napari-spam.make_container_widget
      display_name: Container Threshold
    - command: napari-spam.make_magic_widget
      display_name: Magic Threshold
    - command: napari-spam.make_function_widget
      autogenerate: true
      display_name: Autogenerate Threshold
    - command: napari-spam.make_qwidget
      display_name: Example QWidget
  menus:
    napari/layers/segment:
      - command: napari-spam.make_container_widget
      - command: napari-spam.make_magic_widget
      - command: napari-spam.make_function_widget
      - command: napari-spam.make_qwidget
